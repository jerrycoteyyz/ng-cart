services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ngcart
      POSTGRES_USER: ngcart
      POSTGRES_PASSWORD: ngcart_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d   # runs *.sql files alphabetically on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngcart -d ngcart"]
      interval: 5s
      timeout: 5s
      retries: 5

  analytics:
    build:
      context: ../../Python/orders_and_payments
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ngcart
      DB_USER: ngcart
      DB_PASSWORD: ngcart_dev
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
